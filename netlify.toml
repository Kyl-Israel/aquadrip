[build]
publish = "."
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"

[[headers]]
for = "/Images/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
